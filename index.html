<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PoppyTV</title>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #00B6C0;
      font-family: "Work Sans", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pw-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px 24px;
      width: 100%;
      max-width: 480px;
    }
    .pw-logo {
      width: min(560px, 88vw);
      height: auto;
      display: block;
    }
    .pw-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }
    .pw-input {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 8px;
      font-family: "Work Sans", sans-serif;
      font-size: 16px;
      color: #1a1a1a;
      background: rgba(255,255,255,0.95);
      outline: none;
      text-align: center;
      letter-spacing: 2px;
    }
    .pw-input::placeholder {
      color: #aaa;
      letter-spacing: 0;
    }
    .pw-input:focus {
      background: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.4);
    }
    .pw-btn {
      width: 100%;
      padding: 14px;
      background: #1F7BCC;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: "Work Sans", sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .pw-btn:hover { background: #1868b0; }
    .pw-hint { color: rgba(255,255,255,0.55); font-size: 13px; text-align: center; margin-top: -4px; }
    .pw-error {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    @media (max-width: 480px) {
      .pw-wrap { gap: 36px; }
    }
  </style>
</head>

    <form class="pw-form" onsubmit="checkPassword(event)">
      <input class="pw-input" type="password" id="pw-input" placeholder="Enter password" autocomplete="current-password">
      <p class="pw-hint">Hint: her name starts with M</p>
      <p class="pw-error" id="pw-error"></p>
      <button class="pw-btn" type="submit">Enter</button>
    </form>
  </div>
  <script>
    // Check cookie on load
    function getCookie(name) {
      var v = document.cookie.match('(^|;) ?' + name + '=([^;]*)(;|$)');
      return v ? v[2] : null;
    }
    if (getCookie('poppytv_auth') === '1') {
      window.location.href = 'home.html';
    }

    function checkPassword(e) {
      e.preventDefault();
      var val = document.getElementById('pw-input').value;
      if (val.toLowerCase() === 'mimmy') {
        var exp = new Date();
        exp.setDate(exp.getDate() + 30);
        document.cookie = 'poppytv_auth=1; expires=' + exp.toUTCString() + '; path=/';
        window.location.href = 'home.html';
      } else {
        document.getElementById('pw-error').textContent = 'Incorrect password. Try again.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
  </script>
