<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoppyTV</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0b2530, #0f4a57);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

.container {
  text-align: center;
}

.logo {
  width: 220px;
}

.intro-line {
  margin-top: 16px;
  font-size: 16px;
  letter-spacing: 0.04em;
  color: rgba(255,255,255,0.7);
}

.password {
  margin-top: 32px;
}

input {
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  margin-left: 8px;
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  background: #00b6c0;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <img src="PoppyTV_logo_white.png" class="logo">

  <p class="intro-line">Our family film archive</p>

  <div class="password">
    <input type="password" id="pass" placeholder="Enter password">
    <button onclick="check()">Enter</button>
  </div>
</div>

<script>
function check() {
  const value = document.getElementById("pass").value;
  if (value === "poppy") {
    window.location.href = "home.html";
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>
