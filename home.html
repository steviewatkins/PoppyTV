<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poppy TV</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    color: #0b2530;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
  }

  .nav-left {
    display: flex;
    gap: 10px;
  }

  .nav-button {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid rgba(0,0,0,0.2);
    background: transparent;
    color: #0b2530;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .nav-button.active {
    background: #1f7bcc;
    border-color: #1f7bcc;
    color: white;
  }

  .nav-right {
    display: flex;
    gap: 10px;
  }

  .primary-button {
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid #00B6C0;
    color: #00B6C0;
    background: transparent;
    cursor: pointer;
  }

  .primary-button.active {
    background: #00B6C0;
    color: white;
  }

  .section {
    padding: 24px;
  }

  h2 {
    margin-bottom: 16px;
  }

  .category {
    margin-bottom: 32px;
  }

  .category h3 {
    margin-bottom: 12px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .tile {
    background: #ffffff;
    border-radius: 12px;
    height: 180px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    transition: transform 0.2s ease;
  }

  .tile:hover {
    transform: scale(1.02);
  }

  @media (max-width: 800px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    <button class="nav-button" data-nav="video-memories">Video Memories</button>
    <button class="nav-button" data-nav="short-films">Short Films</button>
    <button class="nav-button" data-nav="vhs">VHS</button>
  </div>

  <div class="nav-right">
    <button class="primary-button">Upload Video</button>
  </div>
</div>

<div class="section" id="content">

  <h2>Video Memories</h2>

  <div class="category">
    <h3>Milestones</h3>
    <div class="grid">
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
    </div>
  </div>

  <div class="category">
    <h3>Holidays</h3>
    <div class="grid">
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
    </div>
  </div>

  <div class="category">
    <h3>Family</h3>
    <div class="grid">
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
      <div class="tile"></div>
    </div>
  </div>

</div>

<script>
  const buttons = document.querySelectorAll('.nav-button');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
</script>

</body>
</html>
