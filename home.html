<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoppyTV</title>

<style>

/* ───────── BASE ───────── */
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: #02090d;
  color: #fff;
}

/* ───────── HEADER ───────── */
.hero {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 20px 24px;
  display: flex;
  align-items: center;

  background:
    radial-gradient(900px 400px at -5% -10%, rgba(0,214,214,0.35), transparent),
    rgba(2,9,13,0.95);
}

.logo {
  font-size: 28px;
  font-weight: 700;
  color: white;
}

.upload-btn {
  margin-left: auto;
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid #00B6C0;
  color: #00B6C0;
  background: rgba(0,182,192,0.1);
  font-weight: 600;
  cursor: pointer;
}

/* ───────── FEATURED ───────── */
.featured-film {
  padding: 40px 24px;
}

.featured-hero-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
}

.featured-hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.featured-hero-shade {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.9)),
    linear-gradient(90deg, rgba(0,0,0,0.7), transparent);
}

.featured-hero-copy {
  position: absolute;
  bottom: 30px;
  left: 30px;
  max-width: 420px;
}

.featured-kicker {
  color: #00B6C0;
  font-size: 12px;
  letter-spacing: 0.1em;
}

.featured-hero-copy h1 {
  margin: 8px 0;
  font-size: 42px;
}

.featured-hero-copy p {
  color: rgba(255,255,255,0.8);
  font-size: 15px;
}

.featured-watch {
  margin-top: 16px;
  padding: 10px 16px;
  border-radius: 999px;
  border: none;
  background: #00B6C0;
  color: white;
  font-weight: 600;
}

/* ───────── SECTION ───────── */
.section {
  padding: 0 24px 60px;
}

.section h2 {
  font-size: 28px;
  margin-bottom: 16px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}

.card {
  background: #071922;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  display: block;
}

.card-title {
  padding: 10px;
  font-size: 14px;
}

/* ───────── MOBILE ───────── */
@media (max-width: 768px) {

  .featured-film {
    padding: 0;
  }

  .featured-hero-card {
    width: 100vw;
    margin-left: calc(50% - 50vw);
    border-radius: 0;
    min-height: 520px;
  }

  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .upload-btn {
    position: absolute;
    right: 16px;
    top: 18px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="hero">
  <div class="logo">PoppyTV</div>
  <button class="upload-btn">Upload</button>
</div>

<!-- FEATURED -->
<section class="featured-film">

  <div class="featured-hero-card">

    <picture>
      <source media="(max-width: 768px)" srcset="Featured_mobile.jpeg">
      <img src="Featured_desktop.jpeg" class="featured-hero-img">
    </picture>

    <div class="featured-hero-shade"></div>

    <div class="featured-hero-copy">
      <div class="featured-kicker">Featured Film</div>
      <h1>Down South</h1>
      <p>
        20th Anniversary. In 2006 the Darwin Davis's headed down south for a week of fun filled chaos.
      </p>
      <button class="featured-watch">Watch Now</button>
    </div>

  </div>

</section>

<!-- COMPILATIONS -->
<section class="section">
  <h2>Compilations</h2>

  <div class="grid">
    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="card-title">Roger's 60th</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="card-title">Julie's 60th</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="card-title">Down South 2006</div>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x200">
      <div class="card-title">Darwin 2004</div>
    </div>
  </div>

</section>

</body>
</html>
