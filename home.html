<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poppy TV</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fa;
  color: #0b2530;
}

/* NAV */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 24px;
}

.nav-left {
  display: flex;
  gap: 10px;
}

.nav-button {
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.2);
  background: transparent;
  color: #0b2530;
  cursor: pointer;
}

.nav-button.active {
  background: #1f7bcc;
  border-color: #1f7bcc;
  color: white;
}

.primary-button {
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid #00B6C0;
  color: #00B6C0;
  background: transparent;
  cursor: pointer;
}

/* CONTENT */
.section {
  padding: 24px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.tile {
  background: #fff;
  border-radius: 12px;
  height: 180px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
}

.tile button {
  padding: 6px 12px;
}

/* MODAL */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal.hidden {
  display: none;
}

.modal-content {
  background: white;
  padding: 24px;
  border-radius: 12px;
  width: 320px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 16px;
}

.danger {
  background: #ff5a5a;
  color: white;
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
}

</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    <button class="nav-button">Video Memories</button>
    <button class="nav-button">Short Films</button>
    <button class="nav-button">VHS</button>
  </div>
  <button class="primary-button">Upload Video</button>
</div>

<div class="section">
  <h2>Video Memories</h2>

  <h3>Milestones</h3>
  <div class="grid">
    <div class="tile"><button onclick="openDeleteModal()">Delete</button></div>
  </div>

  <h3>Holidays</h3>
  <div class="grid">
    <div class="tile"></div>
  </div>

  <h3>Family</h3>
  <div class="grid">
    <div class="tile"></div>
  </div>
</div>

<!-- MODAL -->
<div id="deleteModal" class="modal hidden">
  <div class="modal-content">

    <div id="step1">
      <h2>Delete this video?</h2>
      <p>This will remove it from your collection.</p>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="danger" onclick="goToStep2()">Delete</button>
      </div>
    </div>

    <div id="step2" class="hidden">
      <h2>⚠️ Are you reallllly sure?</h2>
      <p>This video will be gone for good.</p>
      <div class="modal-actions">
        <button onclick="backToStep1()">Go back</button>
        <button class="danger" onclick="confirmDelete()">Yes, delete it</button>
      </div>
    </div>

  </div>
</div>

<script>
function openDeleteModal() {
  document.getElementById('deleteModal').classList.remove('hidden');
  backToStep1();
}

function closeModal() {
  document.getElementById('deleteModal').classList.add('hidden');
}

function goToStep2() {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function backToStep1() {
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
}

function confirmDelete() {
  alert("Deleted (hook up real logic)");
  closeModal();
}
</script>

</body>
</html>
