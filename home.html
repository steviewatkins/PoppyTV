<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poppy TV</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f5f7fa;
  color: #0b2530;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
}

.nav-left {
  display: flex;
  gap: 8px;
}

.nav-button {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.2);
  background: transparent;
  color: #0b2530;
}

.nav-button.active {
  background: #1f7bcc;
  color: white;
}

.primary-button {
  padding: 10px 16px;
  border-radius: 999px;
  border: 1px solid #00B6C0;
  color: #00B6C0;
  background: transparent;
}

.desktop-label { display: inline; }
.mobile-label { display: none; }

@media (max-width: 600px) {
  .desktop-label { display: none; }
  .mobile-label { display: inline; }
}

.section { padding: 16px; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

@media (min-width: 700px) {
  .grid { grid-template-columns: repeat(4, 1fr); }
}

.tile {
  background: white;
  border-radius: 12px;
  height: 160px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
}

.hidden { display: none; }

.modal-content {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 300px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 12px;
}

.danger {
  background: #ff5a5a;
  color: white;
  border-radius: 999px;
  padding: 8px 14px;
  border: none;
}
</style>
</head>

<body>

<div class="nav">
  <div class="nav-left">
    <button class="nav-button active">
      <span class="desktop-label">Video Memories</span>
      <span class="mobile-label">Memories</span>
    </button>
    <button class="nav-button">Short Films</button>
    <button class="nav-button">VHS</button>
  </div>
  <button class="primary-button">Upload Video</button>
</div>

<div class="section">
  <h2>Our family film archive</h2>

  <h3>Milestones</h3>
  <div class="grid">
    <div class="tile"><button onclick="openDeleteModal()">Delete</button></div>
    <div class="tile"></div>
  </div>

  <h3>Holidays</h3>
  <div class="grid">
    <div class="tile"></div>
    <div class="tile"></div>
  </div>

  <h3>Family</h3>
  <div class="grid">
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
</div>

<div id="deleteModal" class="modal hidden">
  <div class="modal-content">

    <div id="step1">
      <h2>Delete this video?</h2>
      <p>This will remove it from your collection.</p>
      <div class="modal-actions">
        <button onclick="closeModal()">Cancel</button>
        <button class="danger" onclick="goToStep2()">Delete</button>
      </div>
    </div>

    <div id="step2" class="hidden">
      <h2>⚠️ Are you reallllly sure?</h2>
      <p>This video will be gone for good.</p>
      <div class="modal-actions">
        <button onclick="backToStep1()">Go back</button>
        <button class="danger" onclick="confirmDelete()">Yes, delete it</button>
      </div>
    </div>

  </div>
</div>

<script>
function openDeleteModal() {
  document.getElementById('deleteModal').classList.remove('hidden');
  backToStep1();
}

function closeModal() {
  document.getElementById('deleteModal').classList.add('hidden');
}

function goToStep2() {
  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function backToStep1() {
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
}

function confirmDelete() {
  alert("Deleted (hook up real logic)");
  closeModal();
}
</script>

</body>
</html>
