<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoppyTV</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f4f4;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1aa3a8, #2bc3c9);
  padding: 20px 32px;
  color: white;
}

/* MAIN CONTAINER (THIS CONTROLS WIDTH) */
.catalogue {
  padding: 60px 5% 120px;
}

/* HEADINGS */
h1 {
  font-family: Georgia, serif;
  font-size: 44px; /* reduced */
  color: #2f73b8;
  margin: 0 0 16px;
}

/* FEATURED */
.featured {
  margin-bottom: 48px;
}

.featured-card {
  width: 100%;
  aspect-ratio: 16 / 9;
  border-radius: 8px; /* matches tiles */
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.22);
  cursor: pointer;
}

.featured-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* GRID */
.section {
  margin-bottom: 64px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.card {
  border-radius: 8px;
  overflow: hidden;
  background: #ddd;
  cursor: pointer;
}

.card img {
  width: 100%;
  aspect-ratio: 4/3;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="header">PoppyTV</div>

<div class="catalogue">

  <!-- FEATURED -->
  <div class="featured">
    <h1>Featured Film</h1>

    <div class="featured-card"
      onclick="openVideo('https://iframe.mediadelivery.net/embed/636169/357b19fd-9d73-4402-8795-518c5509a073')">
      <img src="https://poppytv-upload-worker.hello-291.workers.dev/thumbnail?videoId=357b19fd-9d73-4402-8795-518c5509a073">
    </div>
  </div>

  <!-- VIDEO MEMORIES -->
  <div class="section">
    <h1>Video Memories</h1>

    <h3>Milestones</h3>
    <div class="grid" id="milestones"></div>

    <h3>Holidays</h3>
    <div class="grid" id="holidays"></div>

    <h3>Family</h3>
    <div class="grid" id="family"></div>
  </div>

</div>

<script>
const JSON_URL = "https://steviewatkins.github.io/PoppyTV/videos.json";
const WORKER = "https://poppytv-upload-worker.hello-291.workers.dev";

function thumbnail(id) {
  return `${WORKER}/thumbnail?videoId=${id}&v=1`;
}

function openVideo(url) {
  window.open(url, "_blank");
}

function createCard(item) {
  const el = document.createElement("div");
  el.className = "card";
  el.innerHTML = `<img src="${thumbnail(item.videoId)}">`;

  el.onclick = () => openVideo(
    `https://iframe.mediadelivery.net/embed/636169/${item.videoId}`
  );

  return el;
}

fetch(JSON_URL)
  .then(r => r.json())
  .then(data => {
    data.sections.forEach(section => {
      const container = document.getElementById(section.id);
      if (!container) return;
      section.items.forEach(item => {
        container.appendChild(createCard(item));
      });
    });
  });
</script>

</body>
</html>
