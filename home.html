<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PoppyTV</title>

<style>
  :root {
    --blue: #2f73b8;
    --bg: #f4f4f4;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: #111;
  }

  /* Top header */
  .header {
    background: linear-gradient(135deg, #1aa3a8, #2bc3c9);
    padding: 20px 32px;
    color: #fff;
    font-weight: 600;
  }

  /* Main content container (THIS DEFINES ALL WIDTHS) */
  .container {
    padding: 56px 5% 120px;
  }

  /* Section spacing (uniform across entire page) */
  section {
    margin-bottom: 72px;
  }

  /* Section titles */
  h2 {
    font-family: Georgia, serif;
    font-size: 44px;
    font-weight: 400;
    color: var(--blue);
    letter-spacing: -0.03em;
    margin: 0 0 20px;
  }

  /* Featured film (inherits container width EXACTLY) */
  .featured-card {
    width: 100%;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 20px 60px rgba(0,0,0,0.22);
  }

  .featured-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Video grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  .card {
    border-radius: 8px;
    overflow: hidden;
    background: #ddd;
    cursor: pointer;
  }

  .card img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

</style>
</head>

<body>

<div class="header">PoppyTV</div>

<div class="container">

  <!-- FEATURED -->
  <section>
    <h2>Featured Film</h2>

    <div class="featured-card"
      onclick="openVideo('https://iframe.mediadelivery.net/embed/636169/357b19fd-9d73-4402-8795-518c5509a073')">
      <img
        src="https://poppytv-upload-worker.hello-291.workers.dev/thumbnail?videoId=357b19fd-9d73-4402-8795-518c5509a073&v=1"
        alt="Down South"
      />
    </div>
  </section>

  <!-- VIDEO MEMORIES -->
  <section>
    <h2>Video Memories</h2>

    <h4>Milestones</h4>
    <div class="grid" id="milestones"></div>

    <h4>Holidays</h4>
    <div class="grid" id="holidays"></div>

    <h4>Family</h4>
    <div class="grid" id="family"></div>
  </section>

  <!-- VHS -->
  <section>
    <h2>VHS Tapes</h2>
    <div class="grid" id="vhs"></div>
  </section>

  <!-- SHORT FILMS -->
  <section>
    <h2>Short Films</h2>
    <div class="grid" id="short-films"></div>
  </section>

</div>

<script>
const JSON_URL = "https://steviewatkins.github.io/PoppyTV/videos.json";
const WORKER = "https://poppytv-upload-worker.hello-291.workers.dev";

function thumbnail(id) {
  return `${WORKER}/thumbnail?videoId=${id}&v=1`;
}

function openVideo(url) {
  window.open(url, "_blank");
}

function createCard(item) {
  const el = document.createElement("div");
  el.className = "card";

  el.innerHTML = `<img src="${thumbnail(item.videoId)}" alt="${item.title}">`;

  el.onclick = () => openVideo(
    `https://iframe.mediadelivery.net/embed/636169/${item.videoId}`
  );

  return el;
}

fetch(JSON_URL)
  .then(r => r.json())
  .then(data => {
    data.sections.forEach(section => {
      const container = document.getElementById(section.id);
      if (!container) return;

      section.items.forEach(item => {
        container.appendChild(createCard(item));
      });
    });
  });
</script>

</body>
</html>
